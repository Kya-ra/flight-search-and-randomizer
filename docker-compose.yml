services:
  mysql:
    image: mysql:latest
    container_name: skysaver
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: CSU33012
      MYSQL_USER: scss
      MYSQL_PASSWORD: scss
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
volumes:
  mysql_data: