services:
  mysql:
    image: mysql:latest
    container_name: skysaver
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: CSU33012
      MYSQL_USER: scss
      MYSQL_PASSWORD: scss
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: backend
    working_dir: /app 
    command: mvn spring-boot:run -f backend/pom.xml
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    env_file:
    - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/CSU33012
      SPRING_DATASOURCE_USERNAME: scss
      SPRING_DATASOURCE_PASSWORD: scss

  frontend:
    image: node:20
    container_name: frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"

volumes:
  mysql_data: